<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{if .topic}}Edit{{else}}Create{{end}} Topic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 text-white p-4">
        <div class="container mx-auto">
            <a href="/admin/forum" class="text-white">← Back to Forum</a>
        </div>
    </nav>
    <div class="container mx-auto p-4 max-w-2xl">
        <h2 class="text-2xl font-bold mb-4">
            {{if .topic}}Edit Topic{{else}}Create New Topic{{end}}
        </h2>

        {{if .error}}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            {{.error}}
        </div>
        {{end}}

        <form action="{{if .topic}}/admin/forum/topics/{{.topic.Slug}}/update{{else}}/admin/forum/topics{{end}}" 
              method="POST" class="bg-white p-6 rounded shadow">
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Name *</label>
                <input type="text" name="name" value="{{if .topic}}{{.topic.Name}}{{end}}" 
                       class="w-full border px-3 py-2 rounded" required>
            </div>

            <div class="mb-4">
                <label class="block font-semibold mb-2">Description</label>
                <textarea name="description" rows="4" 
                          class="w-full border px-3 py-2 rounded">{{if .topic}}{{.topic.Description}}{{end}}</textarea>
            </div>

            <div class="mb-4">
                <label class="block font-semibold mb-2">Icon (emoji)</label>
                <input type="text" name="icon" value="{{if .topic}}{{.topic.Icon}}{{end}}" 
                       class="w-full border px-3 py-2 rounded" placeholder="🎬">
            </div>

            <div class="flex gap-2">
                <button type="submit" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">
                    {{if .topic}}Update Topic{{else}}Create Topic{{end}}
                </button>
                <a href="/admin/forum" class="bg-gray-300 px-6 py-2 rounded hover:bg-gray-400">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
