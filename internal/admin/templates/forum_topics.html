<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Forum Topics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 text-white p-4">
        <div class="container mx-auto flex justify-between">
            <h1 class="text-xl font-bold">Cinemesh Admin</h1>
            <div>
                <a href="/admin" class="mr-4">Dashboard</a>
                <a href="/admin/users" class="mr-4">Users</a>
                <a href="/admin/movies" class="mr-4">Movies</a>
                <a href="/admin/genres" class="mr-4">Genres</a>
                <a href="/admin/people" class="mr-4">People</a>
                <a href="/admin/forum" class="mr-4 font-bold border-b-2">Forum</a>
                <a href="/admin/tickets" class="mr-4">Tickets</a>
                <form action="/admin/logout" method="POST" class="inline">
                    <button type="submit" class="text-red-500">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mx-auto p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">Forum Topics</h2>
            <a href="/admin/forum/topics/new" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 transition">
                ➕ Create Topic
            </a>
        </div>

        {{if .error}}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            {{.error}}
        </div>
        {{end}}

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {{range .topics}}
            <div class="relative group">
                <a href="/admin/forum/topics/{{.Slug}}" class="block">
                    <div class="bg-white rounded-lg shadow hover:shadow-lg transition p-6 h-full"
                        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <div class="text-white">
                            <h3 class="text-xl font-bold mb-2">{{.Name}}</h3>
                            <p class="text-sm opacity-90 mb-3">{{.Description}}</p>
                            <div class="flex items-center justify-between text-sm">
                                <span>→</span>
                            </div>
                        </div>
                    </div>
                </a>
                
                <!-- Action buttons (appear on hover) -->
                <div class="absolute top-2 right-2 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <a href="/admin/forum/topics/{{.Slug}}/edit" 
                    class="bg-blue-500 text-white p-2 rounded-full hover:bg-blue-600"
                    title="Edit topic">
                        ✏️
                    </a>
                    <button onclick="deleteTopic('{{.Slug}}', '{{.Name}}')" 
                            class="bg-red-500 text-white p-2 rounded-full hover:bg-red-600"
                            title="Delete topic">
                        🗑️
                    </button>
                </div>
            </div>
            {{else}}
            <div class="col-span-full text-center py-8 text-gray-500">
                No topics found
            </div>
            {{end}}
        </div>
    </div>

    <script>
        async function deleteTopic(topicId, topicName) {
            if (!confirm(`Are you sure you want to delete the topic "${topicName}"? This will delete all threads and replies in this topic.`)) {
                return;
            }

            try {
                const response = await fetch(`/admin/forum/topics/${topicId}/delete`, {
                    method: 'POST',
                });

                if (response.ok) {
                    location.reload();
                } else {
                    const data = await response.json();
                    alert('Failed to delete topic: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error deleting topic');
            }
        }
    </script>
</body>
</html>
